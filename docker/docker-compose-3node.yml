#
# docker-compose-3node.yml — Triple-QEMU SemperOS Hille spanning evaluation
#
# Three QEMU instances on a shared multicast hub. Each presents a
# virtio-net-pci NIC (modern transport, disable-legacy=on) and joins
# multicast group 230.0.0.1:11000 so all three see every frame. VirtIO
# replaces the previous e1000 emulation per FPT-176 c10547 — the E1000
# RX-IRQ stall on node-a was a QEMU emulation bug that VirtIO bypasses
# entirely.
#
# Each container's seL4 image is pre-built with distinct KERNEL_ID +
# SELF_IP + PEER_IP_0 + PEER_IP_1 + SEMPER_NUM_NODES=3 +
# SEMPER_USE_VIRTIO_NET=ON (see /build-isos for cmake invocation).
#
# Usage:
#   cd docker/
#   docker compose -f docker-compose-3node.yml up --abort-on-container-exit \
#       2>&1 | tee ../qemu-3node-hille.log
#

services:
  node-a:
    image: semperos-qemu:latest
    container_name: semperos-3n-node-a
    volumes:
      - ../../../build-node0/images:/sel4-image:ro
    network_mode: host
    environment:
      TIMEOUT: "3600"
    command:
      - -nic
      - none
      - -device
      - virtio-net-pci,disable-legacy=on,disable-modern=off,netdev=eth0,mac=52:54:00:00:00:01
      - -netdev
      - "socket,id=eth0,mcast=230.0.0.1:11000,localaddr=127.0.0.1"

  node-b:
    image: semperos-qemu:latest
    container_name: semperos-3n-node-b
    volumes:
      - ../../../build-node1/images:/sel4-image:ro
    network_mode: host
    environment:
      TIMEOUT: "3600"
    depends_on:
      - node-a
    entrypoint:
      - sh
      - -c
      - "sleep 3 && /run-qemu.sh -nic none -device virtio-net-pci,disable-legacy=on,disable-modern=off,netdev=eth0,mac=52:54:00:00:00:02 -netdev socket,id=eth0,mcast=230.0.0.1:11000,localaddr=127.0.0.1"

  node-c:
    image: semperos-qemu:latest
    container_name: semperos-3n-node-c
    volumes:
      - ../../../build-node2/images:/sel4-image:ro
    network_mode: host
    environment:
      TIMEOUT: "3600"
    depends_on:
      - node-a
    entrypoint:
      - sh
      - -c
      - "sleep 6 && /run-qemu.sh -nic none -device virtio-net-pci,disable-legacy=on,disable-modern=off,netdev=eth0,mac=52:54:00:00:00:03 -netdev socket,id=eth0,mcast=230.0.0.1:11000,localaddr=127.0.0.1"
